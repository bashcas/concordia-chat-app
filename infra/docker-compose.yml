version: "3.9"

# ---------------------------------------------------------------
# Concordia – full local stack
# T-06: Kafka + Zookeeper
# T-07: PostgreSQL, Cassandra, Redis, MinIO  ← this commit
# T-08: Application services
# T-09: Web App
# ---------------------------------------------------------------

services:

  # ── Message broker ────────────────────────────────────────────

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "zkServer.sh status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  kafka:
    image: bitnami/kafka:3.6
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"   # EXTERNAL listener — reachable from the host at localhost:9092
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners so both host and Docker-internal clients can reach the broker.
      # INTERNAL (9093) is used by containers in the same Docker network.
      # EXTERNAL (9092) is advertised to host-side clients via the published port.
      KAFKA_CFG_LISTENERS: INTERNAL://:9093,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # One-shot init container: creates the three application topics once Kafka is healthy.
  # Uses the INTERNAL listener (kafka:9093) so it works entirely inside the Docker network.
  kafka-init:
    image: bitnami/kafka:3.6
    container_name: kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists \
        --topic user-registered --partitions 1 --replication-factor 1 &&
      kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists \
        --topic message-created --partitions 1 --replication-factor 1 &&
      kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists \
        --topic mention --partitions 1 --replication-factor 1 &&
      echo 'Topics created: user-registered, message-created, mention'

  # ── Databases ─────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: discord
      POSTGRES_PASSWORD: discord
      # discord_auth is the primary DB; auth_db / servers_db / tips_db are
      # created by the init script below.
      POSTGRES_DB: discord_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord -d discord_auth"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  cassandra:
    image: cassandra:4
    container_name: cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'describe cluster'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # One-shot init: creates the discord_chat keyspace once Cassandra is healthy.
  cassandra-init:
    image: cassandra:4
    container_name: cassandra-init
    restart: "no"
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./cassandra/init.cql:/init.cql:ro
    entrypoint: ["cqlsh", "cassandra", "-f", "/init.cql"]

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot init: creates the attachments bucket once MinIO is healthy.
  minio-init:
    image: minio/mc
    container_name: minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/attachments &&
      echo 'Bucket attachments created.'

volumes:
  postgres_data:
  cassandra_data:
  redis_data:
  minio_data:
