# ---------------------------------------------------------------
# Concordia – full local stack
# T-06: Kafka + Zookeeper
# T-07: PostgreSQL, Cassandra, Redis, MinIO
# T-08: Application services
# T-09: Web App                           ← this commit
# ---------------------------------------------------------------

services:
  # ── Message broker ────────────────────────────────────────────

  zookeeper:
    image: bitnamilegacy/zookeeper:3.9
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "zkServer.sh status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  kafka:
    image: bitnamilegacy/kafka:3.8
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092" # EXTERNAL listener — reachable from the host at localhost:9092
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners so both host and Docker-internal clients can reach the broker.
      # INTERNAL (9093) is used by containers in the same Docker network.
      # EXTERNAL (9092) is advertised to host-side clients via the published port.
      KAFKA_CFG_LISTENERS: INTERNAL://:9093,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics.sh --bootstrap-server localhost:9092 --list",
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # One-shot init container: creates the three application topics once Kafka is healthy.
  # Uses the INTERNAL listener (kafka:9093) so it works entirely inside the Docker network.
  kafka-init:
    image: bitnamilegacy/kafka:3.8
    container_name: kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists --topic user-registered --partitions 1 --replication-factor 1 &&
        kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists --topic message-created --partitions 1 --replication-factor 1 &&
        kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists --topic mention --partitions 1 --replication-factor 1 &&
        echo 'Topics created: user-registered, message-created, mention'

  # ── Databases ─────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-discord}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-discord}"
      # discord_auth is the primary DB; auth_db / servers_db / tips_db are
      # created by the init script below.
      POSTGRES_DB: discord_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-discord} -d discord_auth"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  cassandra:
    image: cassandra:4
    container_name: cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'describe cluster'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # One-shot init: creates the discord_chat keyspace once Cassandra is healthy.
  cassandra-init:
    image: cassandra:4
    container_name: cassandra-init
    restart: "no"
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./cassandra/init.cql:/init.cql:ro
    entrypoint: ["cqlsh", "cassandra", "-f", "/init.cql"]

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000" # S3-compatible API
      - "9001:9001" # Web console
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot init: creates the attachments bucket once MinIO is healthy.
  minio-init:
    image: minio/mc
    container_name: minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD && mc mb --ignore-existing local/attachments && echo 'Bucket attachments created.'"

  # ── Application services ──────────────────────────────────────

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    container_name: gateway
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      GATEWAY_PORT: "${GATEWAY_PORT:-8080}"
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    container_name: auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: "8081"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/auth_db"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-discord}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:-discord}"
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  servers:
    build:
      context: ..
      dockerfile: services/servers/Dockerfile
    container_name: servers
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"
      - "50051:50051"
    environment:
      SERVER_PORT: "8082"
      GRPC_PORT: "50051"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/servers_db"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-discord}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:-discord}"
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  chat:
    build:
      context: ../services/chat
    container_name: chat
    restart: unless-stopped
    depends_on:
      cassandra:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CHAT_PORT: "${CHAT_PORT:-8083}"
      CASSANDRA_HOST: cassandra
      KAFKA_BROKERS: kafka:9093
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  voice:
    build:
      context: ../services/voice
    container_name: voice
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      VOICE_PORT: "${VOICE_PORT:-8084}"
      REDIS_ADDR: redis://redis:6379
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
      GRPC_ADDR: "servers:50051"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8084/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  tips:
    build:
      context: ../services/tips
    container_name: tips
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      TIPS_PORT: "${TIPS_PORT:-8085}"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-discord}:${POSTGRES_PASSWORD:-discord}@postgres:5432/tips_db"
      KAFKA_BROKERS: kafka:9093
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8085/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  presence:
    build:
      context: ../services/presence
    container_name: presence
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8086:8086"
    environment:
      PRESENCE_PORT: "${PRESENCE_PORT:-8086}"
      REDIS_ADDR: redis:6379
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Web App ───────────────────────────────────────────────────

  web-app:
    build:
      context: ../apps/web-app
    container_name: web-app
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount source for hot-reload; named volume keeps container node_modules intact.
      - ../apps/web-app:/app
      - web_app_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://gateway:8080}"
      # Polling watcher needed for hot-reload on Docker Desktop (Mac/Windows).
      WATCHPACK_POLLING: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  cassandra_data:
  redis_data:
  minio_data:
  web_app_node_modules:
