# ---------------------------------------------------------------
# Concordia – full local stack
# T-06: Kafka + Zookeeper
# T-07: PostgreSQL, Cassandra, Redis, MinIO
# T-08: Application services
# T-09: Web App
#
# Security patterns:
#   Pattern 1 — Reverse Proxy:        services/reverse-proxy (sole public entry)
#   Pattern 2 — Network Segmentation: public-net + private-net (internal: true)
#   Pattern 3 — Audit Trail:          audit + audit-db services
# ---------------------------------------------------------------
services:
  # ── Message broker ────────────────────────────────────────────

  zookeeper:
    image: bitnamilegacy/zookeeper:3.9
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    networks:
      - private-net
    healthcheck:
      test: ["CMD-SHELL", "zkServer.sh status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  kafka:
    image: bitnamilegacy/kafka:3.8
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - private-net
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      # Single INTERNAL listener (9093). Since Network Segmentation the broker
      # is never reachable from the host, so the EXTERNAL listener was dropped.
      KAFKA_CFG_LISTENERS: INTERNAL://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics.sh --bootstrap-server localhost:9093 --list",
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # One-shot init container: creates the application topics once Kafka is healthy.
  # Uses the INTERNAL listener (kafka:9093) so it works entirely inside the Docker network.
  kafka-init:
    image: bitnamilegacy/kafka:3.8
    container_name: kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - private-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists --topic user-registered --partitions 1 --replication-factor 1 &&
        kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists --topic message-created --partitions 1 --replication-factor 1 &&
        kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists --topic mention --partitions 1 --replication-factor 1 &&
        kafka-topics.sh --bootstrap-server kafka:9093 --create --if-not-exists --topic audit.events --partitions 1 --replication-factor 1 &&
        echo 'Topics created: user-registered, message-created, mention, audit.events'

  # ── Databases ─────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-discord}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-discord}"
      # discord_auth is the primary DB; auth_db / servers_db / tips_db are
      # created by the init script below.
      POSTGRES_DB: discord_auth
    networks:
      - private-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-discord} -d discord_auth"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  cassandra:
    image: cassandra:4
    container_name: cassandra
    restart: unless-stopped
    networks:
      - private-net
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh localhost 9042 -e 'describe cluster'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # One-shot init: creates the discord_chat keyspace once Cassandra is healthy.
  cassandra-init:
    image: cassandra:4
    container_name: cassandra-init
    restart: "no"
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - private-net
    volumes:
      - ./cassandra/init.cql:/init.cql:ro
    entrypoint: ["cqlsh", "cassandra", "-f", "/init.cql"]

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - private-net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    command: server /data --console-address ":9001"
    networks:
      - private-net
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot init: creates the attachments bucket once MinIO is healthy.
  minio-init:
    image: minio/mc
    container_name: minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - private-net
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD && mc mb --ignore-existing local/attachments && mc anonymous set download local/attachments && echo 'Bucket attachments created and set to public-read.'"

  # ── Application services ──────────────────────────────────────

  # API Gateway — a PRIVATE component since the Reverse Proxy pattern.
  # It listens on plain HTTP; TLS is terminated at the reverse proxy.
  # No host port: it is reached only via the reverse proxy (/api/*, /ws).
  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    container_name: gateway
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - private-net
    environment:
      GATEWAY_PORT: "8080"
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
      # The browser's only origin is the reverse proxy's public URL.
      ALLOWED_ORIGINS: "https://localhost,app://-"
      TLS_ENABLED: "false"
      # Audit Trail (Pattern 3): emit security events fire-and-forget to Kafka.
      KAFKA_BROKERS: "kafka:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    container_name: auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - private-net
    environment:
      SERVER_PORT: "8081"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/auth_db"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-discord}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:-discord}"
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  servers:
    build:
      context: ..
      dockerfile: services/servers/Dockerfile
    container_name: servers
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - private-net
    environment:
      SERVER_PORT: "8082"
      GRPC_PORT: "50051"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/servers_db"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-discord}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:-discord}"
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  chat:
    build:
      context: ..
      dockerfile: services/chat/Dockerfile
    container_name: chat
    restart: unless-stopped
    depends_on:
      cassandra:
        condition: service_healthy
      kafka:
        condition: service_healthy
      servers:
        condition: service_healthy
      minio:
        condition: service_healthy
      presence:
        condition: service_healthy
    networks:
      - private-net
    environment:
      CHAT_PORT: "${CHAT_PORT:-8083}"
      CASSANDRA_HOST: cassandra
      CASSANDRA_KEYSPACE: discord_chat
      KAFKA_BROKERS: kafka:9093
      SERVERS_GRPC_ADDR: "http://servers:50051"
      SERVERS_HTTP_ADDR: "http://servers:8082"
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
      MINIO_ENDPOINT_INTERNAL: "http://minio:9000"
      MINIO_ENDPOINT_PUBLIC: "${MINIO_ENDPOINT_PUBLIC:-http://localhost:9000}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_BUCKET: "${MINIO_BUCKET:-attachments}"
      PRESENCE_HTTP_ADDR: "http://presence:8086"
      # Internal chat -> gateway fan-out call; gateway now listens on plain HTTP.
      GATEWAY_INTERNAL_PUSH_URL: "http://gateway:8080/internal/push"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  voice:
    build:
      context: ..
      dockerfile: services/voice/Dockerfile
    container_name: voice
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - private-net
    environment:
      VOICE_PORT: "${VOICE_PORT:-8084}"
      REDIS_ADDR: redis://redis:6379
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
      GRPC_ADDR: "servers:50051"
      # Audit Trail (Pattern 3): emit voice-session events fire-and-forget to Kafka.
      KAFKA_BROKERS: "kafka:9093"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8084/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  tips:
    build:
      context: ../services/tips
    container_name: tips
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - private-net
    environment:
      TIPS_PORT: "${TIPS_PORT:-8085}"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-discord}:${POSTGRES_PASSWORD:-discord}@postgres:5432/tips_db"
      KAFKA_BROKERS: kafka:9093
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8085/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  presence:
    build:
      context: ../services/presence
    container_name: presence
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - private-net
    environment:
      PRESENCE_PORT: "${PRESENCE_PORT:-8086}"
      REDIS_ADDR: redis:6379
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Audit Trail (Pattern 3) ───────────────────────────────────

  # Append-only audit log store. Separate Postgres instance, isolated from the
  # operational database. INSERT-only roles are created by init.sql.
  audit-db:
    image: postgres:16
    container_name: audit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${AUDIT_DB_SUPERUSER:-audit_admin}"
      POSTGRES_PASSWORD: "${AUDIT_DB_SUPERUSER_PASSWORD:-audit_admin}"
      POSTGRES_DB: audit
      # Passed through to init.sql to set the role passwords.
      AUDIT_WRITER_PASSWORD: "${AUDIT_WRITER_PASSWORD:-audit_writer}"
      AUDIT_READER_PASSWORD: "${AUDIT_READER_PASSWORD:-audit_reader}"
    networks:
      - private-net
    volumes:
      - audit_db_data:/var/lib/postgresql/data
      - ./audit-db/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUDIT_DB_SUPERUSER:-audit_admin} -d audit"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Audit Service — consumes audit.events from Kafka, hash-chains and persists
  # them, and exposes a forensic query endpoint protected by an admin JWT.
  audit:
    build:
      context: ..
      dockerfile: services/audit/Dockerfile
    container_name: audit
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      audit-db:
        condition: service_healthy
    networks:
      - private-net
    environment:
      AUDIT_PORT: "8087"
      KAFKA_BROKERS: "kafka:9093"
      AUDIT_TOPIC: "audit.events"
      AUDIT_DB_WRITER_URL: "postgres://audit_writer:${AUDIT_WRITER_PASSWORD:-audit_writer}@audit-db:5432/audit?sslmode=disable"
      AUDIT_DB_READER_URL: "postgres://audit_reader:${AUDIT_READER_PASSWORD:-audit_reader}@audit-db:5432/audit?sslmode=disable"
      JWT_SECRET: "${JWT_SECRET:-changeme-32-byte-dev-secret!!!}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Web App ───────────────────────────────────────────────────

  web-app:
    build:
      context: ../apps/web-app
    container_name: web-app
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - private-net
    volumes:
      # Bind-mount source for hot-reload; named volume keeps container node_modules intact.
      - ../apps/web-app:/app
      - web_app_node_modules:/app/node_modules
    environment:
      # The browser reaches the API through the reverse proxy under /api.
      # WebSocket (/ws) is derived from this by stripping the /api suffix.
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-https://localhost/api}"
      # Polling watcher needed for hot-reload on Docker Desktop (Mac/Windows).
      WATCHPACK_POLLING: "true"
    healthcheck:
      # 127.0.0.1, not localhost: BusyBox wget resolves localhost to ::1 but
      # the Next.js dev server listens IPv4-only.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Reverse Proxy (Pattern 1) ─────────────────────────────────
  # The ONLY public-facing component. Terminates TLS, routes by URL
  # (/api/* and /ws -> gateway, everything else -> web-app), applies
  # IP-based rate limiting and security headers.
  # On BOTH networks: it bridges the public internet to the private subnet.
  reverse-proxy:
    build:
      context: ../services/reverse-proxy
    container_name: reverse-proxy
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
      web-app:
        condition: service_healthy
    networks:
      - public-net
      - private-net
    ports:
      - "80:80"   # HTTP — redirects to HTTPS
      - "443:443" # HTTPS — public entry point
    volumes:
      # TLS material migrated here from the gateway (Secure Channel pattern).
      - ./certs:/certs:ro
    healthcheck:
      # 127.0.0.1, not localhost: nginx listens IPv4-only by default.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ── Networks (Pattern 2 — Network Segmentation) ─────────────────
# public-net  : only the reverse proxy is attached here; carries internet traffic.
# private-net : every other component. `internal: true` blocks any traffic to
#               the host or the outside world — containers can only talk to
#               each other. The reverse proxy bridges the two networks.
networks:
  public-net:
    driver: bridge
  private-net:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  cassandra_data:
  redis_data:
  minio_data:
  web_app_node_modules:
  audit_db_data:
