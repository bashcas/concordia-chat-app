# =============================================================================
# Concordia — Reverse Proxy (Pattern 1)
# =============================================================================
# The ONLY component exposed to the public internet. Responsibilities:
#   - Terminate TLS (migrated here from the API Gateway / Secure Channel pattern)
#   - Route by URL: /api/* and /ws -> API Gateway, everything else -> Web App
#   - IP-based rate limiting, with stricter limits for expensive page renders
#   - Hide the existence/technology of the Gateway and Web App
#   - Apply security headers, request size limits, compression
# It listens on :80 (redirect) and :443 (TLS). Backends are plain HTTP/WS,
# reachable only on the private Docker network.
# =============================================================================

# --- IP-based rate-limit zones (http context) -------------------------------
# Two zones because the cost profiles differ dramatically:
#   ssr_zone — page renders are expensive (server-side JS + internal API calls)
#   api_zone — API calls are cheap (one JWT verify + one DB/service hop)
limit_req_zone $binary_remote_addr zone=ssr_zone:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=100r/s;

# --- WebSocket upgrade helper ------------------------------------------------
# Sets the Connection header to "upgrade" only for websocket requests, and
# "close" otherwise — so plain HTTP requests keep working normally.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- Upstreams ---------------------------------------------------------------
upstream gateway {
    server gateway:8080;
    keepalive 32;
}

upstream web_app {
    server web-app:3000;
    keepalive 32;
}

# --- :80 -> :443 redirect ----------------------------------------------------
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# --- :443 TLS terminator -----------------------------------------------------
# Also listens plain-HTTP on :8088 as an entry point for a public tunnel
# (cloudflared / ngrok) — the tunnel terminates TLS itself, so this hop is
# plain HTTP and serves the exact same routing as the :443 listener.
server {
    listen 443 ssl;
    listen 8088;
    http2 on;
    server_name localhost;

    # TLS material migrated from services/gateway/certs -> infra/certs.
    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;

    # Hardened TLS — mirrors the gateway's previous crypto/tls config.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_ecdh_curve      X25519:prime256v1;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # Anti-fingerprinting: do not advertise the nginx version.
    server_tokens off;

    # Security headers applied to every response.
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "DENY"             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Reject oversized requests early; aligns with the attachment upload limit.
    client_max_body_size 25m;

    # Compress text responses at the edge.
    gzip            on;
    gzip_types      application/json text/css application/javascript text/plain;

    # --- Reverse-proxy's own health check (no backend needed) ----------------
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # --- API + WebSocket -> Gateway ------------------------------------------
    # The trailing slash on proxy_pass strips the /api/ prefix, so the gateway
    # still sees its original routes (/auth, /servers, /ws, /voice/.../signal).
    # WebSocket upgrade headers are set here because both the chat (/ws) and
    # voice (/voice/{id}/signal) websockets travel through this prefix.
    location /api/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://gateway/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
    }

    # --- Static framework assets -> Web App ----------------------------------
    # JS/CSS chunks are cheap and a single page load fetches many at once, so
    # they are NOT subject to the strict per-render SSR rate limit.
    location /_next/ {
        proxy_pass http://web_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # --- Everything else -> Web App (page renders) ---------------------------
    # The ssr_zone limit guards expensive server-side page renders only.
    location / {
        limit_req zone=ssr_zone burst=15 nodelay;
        proxy_pass http://web_app;
        proxy_http_version 1.1;
        # Next.js dev mode serves hot-reload (HMR) over a websocket.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
