# =============================================================================
# Concordia — Reverse Proxy (Secure Channel disabled; plain HTTP only)
# =============================================================================
# Listens on :8088 only. Use http://localhost:8088 (or a tunnel forwarding here).

limit_req_zone $binary_remote_addr zone=ssr_zone:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=__API_RATE_LIMIT__r/s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream gateway {
    server gateway:8080;
    keepalive 32;
}

upstream web_app {
    server web-app:3000;
    keepalive 32;
}

server {
    listen 8088;
    server_name localhost;

    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options       "DENY"   always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    gzip            on;
    gzip_types      application/json text/css application/javascript text/plain;

    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location /api/ {
        limit_req zone=api_zone burst=__API_RATE_BURST__ nodelay;
        proxy_pass http://gateway/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /_next/ {
        proxy_pass http://web_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=ssr_zone burst=15 nodelay;
        proxy_pass http://web_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
