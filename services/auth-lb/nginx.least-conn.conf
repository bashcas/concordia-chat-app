# =============================================================================
# Concordia — Auth Load Balancer (Least Connections)
# =============================================================================
# Each new request goes to the replica with the fewest active connections.
# Useful here because bcrypt(12) on login has variable CPU cost, so replicas
# busy on slow requests should receive fewer new ones.

events {}

http {
    upstream auth_pool {
        least_conn;
        server auth_1:8081;
        server auth_2:8081;
        server auth_3:8081;
        keepalive 32;
    }

    server {
        listen 8081;
        server_name auth-lb;

        location / {
            proxy_pass http://auth_pool;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
