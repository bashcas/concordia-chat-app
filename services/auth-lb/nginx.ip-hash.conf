# =============================================================================
# Concordia — Auth Load Balancer (IP Hash)
# =============================================================================
# A given client IP always maps to the same replica (sticky sessions without
# a shared session store).
#
# NOTE: in this deployment the only client of auth-lb is the gateway container,
# so every request arrives from a single source IP and all traffic pins to one
# replica. That is a real demonstration of why ip_hash is unsuitable when the
# immediate client is itself a proxy. To observe distribution, hit auth-lb from
# multiple hosts directly.

events {}

http {
    upstream auth_pool {
        ip_hash;
        server auth_1:8081;
        server auth_2:8081;
        server auth_3:8081;
    }

    server {
        listen 8081;
        server_name auth-lb;

        location / {
            proxy_pass http://auth_pool;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
