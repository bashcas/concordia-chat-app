# =============================================================================
# Concordia — Auth Load Balancer (Round Robin)
# =============================================================================
# Sits between the gateway and the auth replicas (auth_1, auth_2, auth_3).
# Round Robin is Nginx's default: no explicit directive needed inside upstream.
# Requests cycle: auth_1 -> auth_2 -> auth_3 -> auth_1 -> ...

events {}

http {
    upstream auth_pool {
        # Round Robin (default).
        server auth_1:8081;
        server auth_2:8081;
        server auth_3:8081;
        keepalive 32;
    }

    server {
        listen 8081;
        server_name auth-lb;

        location / {
            proxy_pass http://auth_pool;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
