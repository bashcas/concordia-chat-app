# =============================================================================
# Concordia — Gateway Load Balancer (Round Robin)
# =============================================================================
# Round Robin is Nginx's default: no explicit directive inside upstream.
# Requests cycle: gateway -> gateway_2 -> gateway_3 -> gateway -> ...
# Swap this file in (see infra/docker-compose.gateway-scale.yml) for an
# algorithm-vs-algorithm comparison against least-conn.

events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream gateway_pool {
        # Round Robin (default).
        server gateway:8080;
        server gateway_2:8080;
        server gateway_3:8080;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name gateway-lb;

        location / {
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }
    }
}
