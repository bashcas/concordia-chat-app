# =============================================================================
# Concordia — Gateway Load Balancer (Least Connections)  [DEFAULT]
# =============================================================================
# Sits between the public ingress (reverse proxy / k6) and the gateway replicas
# (gateway, gateway_2, gateway_3). least_conn routes each new request to the
# replica with the fewest active connections — the algorithm named in the Lab 7
# scaling scenario, well suited to the gateway because login requests fan out to
# bcrypt-bound auth replicas and so have variable, bursty cost.
#
# NOTE on WebSockets: /ws connections are stateful and held in-memory by ONE
# gateway replica, and Chat's POST /internal/push must reach that same replica.
# Spreading /ws + /internal/push across replicas breaks real-time delivery, so
# this LB is intended for the stateless REST/login throughput experiment. See
# docs/gateway-load-balancing.md.

events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream gateway_pool {
        least_conn;
        server gateway:8080;
        server gateway_2:8080;
        server gateway_3:8080;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name gateway-lb;

        location / {
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }
    }
}
