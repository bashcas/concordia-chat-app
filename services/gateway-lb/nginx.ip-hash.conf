# =============================================================================
# Concordia — Gateway Load Balancer (IP Hash)
# =============================================================================
# ip_hash maps each client IP to a fixed replica (sticky sessions). Included for
# the algorithm comparison and to demonstrate its limitation behind a proxy:
# when the gateway-lb's only client is another proxy (the reverse proxy), every
# request arrives from one source IP, so ip_hash pins ALL traffic to a single
# replica — same finding as auth-lb. Useful only when the immediate client is
# the real end user. Swap in via infra/docker-compose.gateway-scale.yml.

events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream gateway_pool {
        ip_hash;   # A given client IP always reaches the same replica.
        server gateway:8080;
        server gateway_2:8080;
        server gateway_3:8080;
    }

    server {
        listen 8080;
        server_name gateway-lb;

        location / {
            proxy_pass http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }
    }
}
